<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Details | Book Haven</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@300;400;700&family=Open+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        .book-details-section {
            padding: 60px 0;
        }
        
        .book-details-container {
            display: grid;
            grid-template-columns: 300px 1fr;
            gap: 50px;
            align-items: start;
        }
        
        .book-details-cover {
            background: var(--gray-color);
            border-radius: 10px;
            padding: 30px;
            text-align: center;
            box-shadow: var(--shadow-medium);
        }
        
        .book-details-cover img {
            max-width: 100%;
            height: auto;
            border-radius: 5px;
            box-shadow: var(--shadow-light);
        }
        
        .book-details-cover .placeholder-cover {
            width: 100%;
            height: 400px;
            background: linear-gradient(135deg, var(--primary-color), var(--accent-color));
            border-radius: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 5rem;
            color: white;
        }
        
        .book-details-info {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: var(--shadow-light);
        }
        
        .book-details-info h1 {
            font-size: 2.5rem;
            color: var(--primary-color);
            margin-bottom: 10px;
        }
        
        .book-details-info .author {
            font-size: 1.2rem;
            color: #666;
            margin-bottom: 20px;
        }
        
        .book-meta {
            display: flex;
            gap: 30px;
            margin-bottom: 30px;
            padding: 20px 0;
            border-top: 1px solid var(--gray-color);
            border-bottom: 1px solid var(--gray-color);
        }
        
        .meta-item {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        .meta-item i {
            font-size: 1.5rem;
            color: var(--primary-color);
            margin-bottom: 5px;
        }
        
        .meta-item span {
            font-size: 0.9rem;
            color: #666;
        }
        
        .meta-item strong {
            color: var(--dark-color);
        }
        
        .book-rating-display {
            margin-bottom: 30px;
        }
        
        .book-rating-display .stars {
            color: var(--secondary-color);
            font-size: 1.5rem;
            margin-bottom: 10px;
        }
        
        .book-rating-display .rating-text {
            color: #666;
        }
        
        .book-description {
            margin-bottom: 30px;
        }
        
        .book-description h3 {
            color: var(--primary-color);
            margin-bottom: 15px;
        }
        
        .book-description p {
            color: #555;
            line-height: 1.8;
        }
        
        .book-summary {
            margin-bottom: 30px;
        }
        
        .book-summary h3 {
            color: var(--primary-color);
            margin-bottom: 15px;
        }
        
        .book-summary p {
            color: #555;
            line-height: 1.8;
        }
        
        .book-actions {
            display: flex;
            gap: 15px;
            margin-top: 30px;
        }
        
        .book-actions .btn {
            padding: 15px 30px;
            font-size: 1rem;
        }
        
        .btn-outline {
            background: transparent;
            border: 2px solid var(--primary-color);
            color: var(--primary-color);
        }
        
        .btn-outline:hover {
            background: var(--primary-color);
            color: white;
        }
        
        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            color: var(--primary-color);
            margin-bottom: 30px;
            font-weight: 600;
        }
        
        .back-link:hover {
            color: var(--accent-color);
        }
        
        .not-found {
            text-align: center;
            padding: 100px 0;
        }
        
        .not-found i {
            font-size: 5rem;
            color: var(--gray-color);
            margin-bottom: 20px;
        }
        
        .not-found h2 {
            color: var(--primary-color);
            margin-bottom: 15px;
        }
        
        .not-found p {
            color: #666;
            margin-bottom: 30px;
        }
        
        @media (max-width: 768px) {
            .book-details-container {
                grid-template-columns: 1fr;
            }
            
            .book-meta {
                flex-wrap: wrap;
                justify-content: center;
            }
            
            .book-actions {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header>
        <div class="container header-container">
            <div class="logo">
                <i class="fas fa-book-open"></i>
                <h1>Book <span>Haven</span></h1>
            </div>
            
            <nav>
                <ul>
                    <li><a href="index.html">Home</a></li>
                    <li><a href="index.html#featured">Featured</a></li>
                    <li><a href="index.html#categories">Categories</a></li>

                    <li><a href="about.html">About</a></li>
                    <li><a href="index.html#contact">Contact</a></li>
                </ul>
            </nav>
            
            <div class="header-actions">
                <div class="user-actions">
                    <a href="#" class="cart-link"><i class="fas fa-shopping-cart"></i></a>
                    <a href="login.html" class="auth-link login"><i class="fas fa-sign-in-alt"></i> Login</a>
                    <a href="signup.html" class="auth-link signup"><i class="fas fa-user-plus"></i> Sign Up</a>
                </div>
            </div>
        </div>
    </header>

    <!-- Book Details Section -->
    <section class="book-details-section">
        <div class="container">
            <a href="index.html#featured" class="back-link">
                <i class="fas fa-arrow-left"></i> Back to Featured Books
            </a>
            
            <div id="bookContent">
                <!-- Book content will be loaded dynamically -->
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer>
        <div class="container">
            <div class="footer-content">
                <div class="footer-section">
                    <h3>Book Haven</h3>
                    <p>Your digital library for endless reading adventures.</p>
                </div>
                <div class="footer-section">
                    <h3>Quick Links</h3>
                    <ul>
                        <li><a href="index.html">Home</a></li>
                        <li><a href="about.html">About Us</a></li>
                        <li><a href="index.html#contact">Contact</a></li>
                    </ul>
                </div>
                <div class="footer-section">
                    <h3>Connect</h3>
                    <div class="social-links">
                        <a href="#"><i class="fab fa-facebook"></i></a>
                        <a href="#"><i class="fab fa-twitter"></i></a>
                        <a href="#"><i class="fab fa-instagram"></i></a>
                        <a href="#"><i class="fab fa-linkedin"></i></a>
                    </div>
                </div>
            </div>
            <div class="footer-bottom">
                <p>&copy; 2026 Book Haven. All rights reserved.</p>
            </div>
        </div>
    </footer>

    <script>
        // Book data
        const books = {
            'midnight': {
                title: 'The Midnight Library',
                author: 'Matt Haig',
                rating: 4.5,
                reviews: 2847,
                genre: 'Fiction',
                pages: 304,
                published: '2020',
                price: '$14.99',
                description: 'Between life and death there is a library, and within that library, the shelves go on forever. Every book provides a chance to try another life you could have lived.',
                summary: 'Between life and death there is a library, and within that library, the shelves go on forever. Every book provides a chance to try another life you could have lived. To see how things would be if you had been someone else...<br><br>Nora Seed finds herself in the Midnight Library, where she can try out different versions of her life. With the help of an old friend, she must search for the most fulfilling life and learn to appreciate the one she has.<br><br>This is a beautiful and haunting story about the choices we make and the regrets we carry, exploring the possibilities that life offers and what it means to be happy with who we are.'
            },
            'klara': {
                title: 'Klara and the Sun',
                author: 'Kazuo Ishiguro',
                rating: 4.0,
                reviews: 1923,
                genre: 'Science Fiction',
                pages: 320,
                published: '2021',
                price: '$16.99',
                description: 'A thrilling book that offers a look at our changing world through the eyes of an unforgettable narrator.',
                summary: 'Here is the story of Klara, an Artificial Friend with outstanding observational qualities, who, from her place in the store, watches carefully the behavior of those who come in to browse, and of those who pass on the street outside. She remains hopeful that a customer will soon choose her.<br><br>Klara is a highly intelligent robot who can read human emotions and learn from interactions. As she observes the world around her, she begins to develop her own understanding of love, sacrifice, and what it means to be human. Through Klara\'s eyes, Ishiguro explores themes of consciousness, identity, and the nature of love in an age of artificial intelligence.'
            },
            'fourwinds': {
                title: 'The Four Winds',
                author: 'Kristin Hannah',
                rating: 5.0,
                reviews: 3421,
                genre: 'Historical Fiction',
                pages: 464,
                published: '2021',
                price: '$18.99',
                description: 'A story of survival and hope, of love and loss, set against the backdrop of the Great Depression.',
                summary: 'The Four Winds is a rich, historical novel set in Texas during the Great Depression. Elsa Martinelli, a woman born into poverty, has fought her entire life to carve out a meaningful life for herself and her family.<br><br>When drought descends on the land, threatening the livelihoods of farmers, Elsa must make impossible choices to protect her family. She faces losing everything she\'s built, but discovers an inner strength she never knew she possessed.<br><br>This is a powerful story of resilience, sacrifice, and the unbreakable human spirit in the face of adversity.'
            },
            'hailmary': {
                title: 'Project Hail Mary',
                author: 'Andy Weir',
                rating: 4.5,
                reviews: 5621,
                genre: 'Science Fiction',
                pages: 496,
                published: '2021',
                price: '$19.99',
                description: 'A lone astronaut must save the earth from disaster in this propulsive interstellar voyage.',
                summary: 'Ryland Grace is the sole survivor on a desperate, last-chance mission—and if he fails, humanity and the earth itself will perish. Except that right now, he doesn\'t know who he is, or why he\'s been sent on this impossible journey.<br><br>All he knows is that he\'s stranded on a spacecraft, and the people who sent him are all dead. He must rely on an unlikely ally—Rocky, an alien with his own agenda—to survive and find a way back to Earth.<br><br>From the author of The Martian comes another thrilling science fiction adventure that combines hard science with compelling characters and high-stakes action.'
            }
        };

        // Get book ID from URL
        const urlParams = new URLSearchParams(window.location.search);
        const bookId = urlParams.get('book');

        // Render book content
        const bookContent = document.getElementById('bookContent');
        
        if (bookId && books[bookId]) {
            const book = books[bookId];
            
            // Generate stars
            let stars = '';
            for (let i = 1; i <= 5; i++) {
                if (i <= Math.floor(book.rating)) {
                    stars += '<i class="fas fa-star"></i>';
                } else if (i - 0.5 === book.rating) {
                    stars += '<i class="fas fa-star-half-alt"></i>';
                } else {
                    stars += '<i class="far fa-star"></i>';
                }
            }
            
            // Get image source
            let imageSrc = '';
            let coverIcon = '';
            switch(bookId) {
                case 'midnight':
                    imageSrc = 'books/midnight.jpg';
                    coverIcon = 'fa-moon';
                    break;
                case 'klara':
                    imageSrc = 'books/klara.jpg';
                    coverIcon = 'fa-sun';
                    break;
                case 'fourwinds':
                    imageSrc = 'books/four winds.jpg';
                    coverIcon = 'fa-wind';
                    break;
                case 'hailmary':
                    imageSrc = 'books/andy weir.jpeg';
                    coverIcon = 'fa-rocket';
                    break;
                default:
                    coverIcon = 'fa-book';
            }
            
            bookContent.innerHTML = `
                <div class="book-details-container">
                    <div class="book-details-cover">
                        <img src="${imageSrc}" alt="${book.title}" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
                        <div class="placeholder-cover" style="display: none;">
                            <i class="fas ${coverIcon}"></i>
                        </div>
                    </div>
                    
                    <div class="book-details-info">
                        <h1>${book.title}</h1>
                        <p class="author">by ${book.author}</p>
                        
                        <div class="book-rating-display">
                            <div class="stars">${stars}</div>
                            <span class="rating-text">${book.rating} out of 5 (${book.reviews.toLocaleString()} reviews)</span>
                        </div>
                        
                        <div class="book-meta">
                            <div class="meta-item">
                                <i class="fas fa-book"></i>
                                <span>Genre</span>
                                <strong>${book.genre}</strong>
                            </div>
                            <div class="meta-item">
                                <i class="fas fa-file-alt"></i>
                                <span>Pages</span>
                                <strong>${book.pages}</strong>
                            </div>
                            <div class="meta-item">
                                <i class="fas fa-calendar"></i>
                                <span>Published</span>
                                <strong>${book.published}</strong>
                            </div>
                            <div class="meta-item">
                                <i class="fas fa-tag"></i>
                                <span>Price</span>
                                <strong>${book.price}</strong>
                            </div>
                        </div>
                        
                        <div class="book-description">
                            <h3>Description</h3>
                            <p>${book.description}</p>
                        </div>
                        
                        <div class="book-summary">
                            <h3>Summary</h3>
                            <p>${book.summary}</p>
                        </div>
                        
                        <div class="book-actions">
                            <a href="#" class="btn"><i class="fas fa-shopping-cart"></i> Add to Cart</a>
                            <a href="#" class="btn btn-outline"><i class="fas fa-heart"></i> Add to Wishlist</a>
                        </div>
                    </div>
                </div>
            `;
        } else {
            bookContent.innerHTML = `
                <div class="not-found">
                    <i class="fas fa-book-open"></i>
                    <h2>Book Not Found</h2>
                    <p>The book you're looking for doesn't exist or has been removed.</p>
                    <a href="index.html#featured" class="btn">Browse Featured Books</a>
                </div>
            `;
        }
    </script>
</body>
</html>
