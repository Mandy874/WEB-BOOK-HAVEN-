<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Book Haven</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@300;400;700&family=Open+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        body {
            background: linear-gradient(135deg, #2c5530 0%, #8b4513 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-card {
            width: 100%;
            max-width: 420px;
            background: white;
            border-radius: 12px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
        }

        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .login-header i {
            font-size: 2rem;
            color: #2c5530;
            margin-bottom: 10px;
        }

        .login-header h1 {
            margin: 0;
            color: #2c5530;
        }

        .form-group { margin-bottom: 18px; }
        .form-group label { display:block; margin-bottom:8px; color: #2c5530; font-weight:600; }
        .form-group input { width:100%; padding:12px; border-radius:6px; border:1px solid #ddd; }

        .remember { display:flex; align-items:center; gap:8px; margin-top:8px; }
        .login-btn { width:100%; padding:12px; background:#2c5530; color:white; border:none; border-radius:6px; font-weight:600; cursor:pointer; }
        .login-btn:hover { background:#8b4513 }

        .alt-links { text-align:center; margin-top:16px; color:#666 }
        .alt-links a { color:#2c5530; font-weight:600 }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="login-header">
            <i class="fas fa-book-open"></i>
            <h1>Welcome Back</h1>
            <p>Log in to your Book Haven account</p>
        </div>

        <form id="loginForm">
            <div class="form-group">
                <label for="loginType">Login As</label>
                <select id="loginType" name="loginType" style="width:100%; padding:12px; border-radius:6px; border:1px solid #ddd; font-size:1rem;">
                    <option value="student">Student</option>
                    <option value="admin">Admin</option>
                </select>
            </div>
            <div class="form-group">
                <label for="email">Email / Username</label>
                <input type="text" id="email" name="email" placeholder="Enter your username" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Your password" required>
            </div>
            <div class="remember">
                <input type="checkbox" id="rememberMe" name="rememberMe">
                <label for="rememberMe">Remember me</label>
            </div>

            <button type="submit" class="login-btn">Login</button>
        </form>

        <div class="alt-links">
            <p>Don't have an account? <a href="signup.html">Sign up</a></p>
            <p><a href="index.html">Back to Home</a></p>
        </div>
    </div>

    <script>
        // Handle form submission
        document.getElementById('loginForm').addEventListener('submit', function(event) {
            event.preventDefault();

            const loginType = document.getElementById('loginType').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            // Student credentials
            const studentUsername = 'student';
            const studentPassword = 'student123';

            // Admin credentials
            const adminUsername = 'admin';
            const adminPassword = 'admin123';

            if (loginType === 'admin') {
                if (email === adminUsername && password === adminPassword) {
                    alert('Login successful! Redirecting to admin dashboard...');
                    window.location.href = 'admin.html';
                } else {
                    alert('Invalid admin credentials. Please try again.');
                }
            } else {
                if (email === studentUsername && password === studentPassword) {
                    alert('Login successful! Welcome back, ' + email);
                    window.location.href = 'index.html';
                } else {
                    alert('Invalid student credentials. Please try again.');
                }
            }
        });
    </script>
</body>
</html>
